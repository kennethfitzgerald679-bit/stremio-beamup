name: Master Branch Protection

on:
  pull_request:
    branches:
      - master

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "PR source branch: $HEAD_REF"

          if [[ "$HEAD_REF" != "development" ]] \
            && [[ ! "$HEAD_REF" =~ ^hotfix/ ]] \
            && [[ ! "$HEAD_REF" =~ ^fix/hotfix- ]]; then
            echo "Error: Pull requests into 'master' must come from 'development', 'hotfix/*', or 'fix/hotfix-*'."
            exit 1
          fi
